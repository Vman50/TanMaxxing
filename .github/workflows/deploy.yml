name: Deploy to GitHub Pages

on:
  push:
    branches: [main, dev]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy deployable files
        run: |
          mkdir _deploy
          cp index.html sw.js _deploy/

      - name: Deploy main → root (production)
        if: github.ref_name == 'main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _deploy
          keep_files: true

      - name: Deploy dev → /dev (preview)
        if: github.ref_name == 'dev'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _deploy
          destination_dir: dev
          keep_files: true
